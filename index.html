<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Restaurante Begoña · Control interno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --cream:#FBF7F1; --card:#FFFFFF; --ink:#3E3A34; --muted:#8B8579; --border:#EAE3D5;
    --peach:#F2C4A6;    --peach-light:#FBEBDE;
    --butter:#EFD98C;   --butter-light:#FBF3D8;
    --sky:#A7C6DC;      --sky-light:#E7F1F7;
    --sage:#9BBB93;     --sage-light:#E4EFDE;
    --rose:#DCA3AA;     --rose-light:#F7E7E9;
    --lavender:#C6B4D8; --lavender-light:#EEE6F3;
    --clay:#D6A276;     --clay-light:#F5E9DB;
    --good:#8FB89A; --warn:#E0A96D; --bad:#D68585;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--cream); color:var(--ink); font-family:'Inter',sans-serif; -webkit-tap-highlight-color:transparent; padding-bottom:40px;}
  h1,h2,h3{font-family:'Fraunces',serif; font-weight:600; margin:0;}

  .app-shell{max-width:1000px; margin:0 auto;}

  header.top{padding:26px 18px 16px; text-align:center;}
  header.top .eyebrow{font-size:15px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink); font-weight:700; font-family:'Fraunces',serif;}
  header.top h1{font-size:22px; color:var(--muted); font-weight:500;}
  header.top .sub{font-size:13px; color:var(--muted); margin-top:4px;}

  .app-switch{display:flex; gap:8px; padding:0 16px 16px; max-width:420px; margin:0 auto;}
  .app-switch button{
    flex:1; border:none; border-radius:12px; padding:10px 8px; cursor:pointer;
    font-family:'Inter',sans-serif; font-weight:600; font-size:12.5px; color:var(--ink);
    background:var(--card); border:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .app-switch button .ic{font-size:16px;}
  .app-switch button.active.appcc{background:var(--sage); border-color:transparent;}
  .app-switch button.active.horario{background:var(--sky); border-color:transparent;}

  nav.tabs{display:flex; overflow-x:auto; gap:8px; padding:6px 16px 14px; scrollbar-width:none;}
  nav.tabs::-webkit-scrollbar{display:none;}
  nav.tabs button{
    flex:0 0 auto; border:1px solid var(--border); background:var(--card); color:var(--ink);
    padding:9px 14px; border-radius:999px; font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600;
    display:flex; align-items:center; gap:6px; cursor:pointer; white-space:nowrap;
  }
  nav.tabs button.active{ border-color:transparent; }
  nav.tabs button:active{ transform:scale(.96); }

  main{padding:4px 16px 30px;}

  .section-head{display:flex; align-items:center; justify-content:space-between; margin:18px 0 10px;}
  .section-head h2{font-size:19px;}
  .section-head .accent-bar{display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:8px;}

  .card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px; margin-bottom:12px; box-shadow:0 1px 2px rgba(62,58,52,.04);}

  .btn{border:none; border-radius:12px; padding:10px 16px; font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px; cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
  .btn:active{transform:scale(.97);}
  .btn-add{background:var(--ink); color:#FFF9EF;}
  .btn-ghost{background:transparent; color:var(--muted); border:1px solid var(--border);}
  .btn-sm{padding:6px 10px; font-size:12.5px; border-radius:9px;}
  .btn-danger{background:var(--rose-light); color:#8A4650;}
  .btn-del{background:var(--rose-light); color:#8A4650; border:none; width:34px;height:34px;border-radius:10px; font-size:15px; display:flex; align-items:center; justify-content:center; cursor:pointer;}

  input[type=text], input[type=date], input[type=number], input[type=tel], select{
    font-family:'Inter',sans-serif; border:1px solid var(--border); background:#FFFDF9; border-radius:9px;
    padding:8px 10px; font-size:14px; color:var(--ink); width:100%;
  }
  input:focus, select:focus{outline:2px solid var(--sky); outline-offset:1px;}
  label.field-label{font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em; display:block; margin-bottom:3px;}

  .row-grid{display:grid; gap:8px; margin-bottom:8px; align-items:end;}
  .empty-hint{text-align:center; color:var(--muted); font-size:13.5px; padding:22px 10px; border:1.5px dashed var(--border); border-radius:14px;}

  /* Month nav (compartido) */
  .month-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:8px;}
  .month-nav button{background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 12px; font-weight:600; cursor:pointer; flex:0 0 auto;}
  .month-nav .label{text-align:center;}
  .month-nav .label h2{font-size:19px;}

  .table-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch; border:1px solid var(--border); border-radius:14px;}
  table.cal{width:100%; border-collapse:collapse; font-size:12.5px; background:var(--card);}
  table.cal th{background:var(--sky-light); color:#2c5570; font-weight:700; padding:7px 4px; font-size:10.5px; text-transform:uppercase; letter-spacing:.02em; white-space:nowrap; position:sticky; top:0;}
  table.cal td{padding:5px 3px; text-align:center; border-bottom:1px solid var(--border);}
  table.cal input, table.cal select{width:100%; min-width:58px; padding:5px 3px; font-size:12px; text-align:center; border:1px solid var(--border); border-radius:6px;}
  table.cal select{min-width:66px;}
  table.cal td.dia{font-weight:700; min-width:30px;}
  table.cal td.total{font-weight:700; background:var(--peach-light); border-radius:6px;}

  /* Limpieza */
  .limpieza-cat{margin-bottom:22px;}
  .item-row{background:var(--card); border:1px solid var(--border); border-radius:14px; margin-bottom:8px; overflow:hidden;}
  .item-head{display:flex; align-items:center; justify-content:space-between; padding:12px 14px; cursor:pointer;}
  .item-head .left{display:flex; flex-direction:column; gap:2px;}
  .item-head .name{font-weight:700; font-size:14.5px;}
  .item-head .freq{font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.03em;}
  .item-head .chev{color:var(--muted); font-size:12px;}
  .months{display:none; grid-template-columns:repeat(3,1fr); gap:8px; padding:0 14px 14px;}
  .months.open{display:grid;}
  .month-chip{display:flex; align-items:center; gap:6px; font-size:12.5px; background:var(--sage-light); border-radius:8px; padding:6px 8px; cursor:pointer; user-select:none;}
  .month-chip.done{background:var(--good); color:#fff; font-weight:600;}
  .month-chip input{display:none;}
  .item-edit-row{display:flex; gap:6px; padding:0 14px 12px; align-items:center;}
  .fixed-pin{font-size:11px; color:var(--muted); white-space:nowrap;}

  /* Anual */
  .bloque-title{font-size:14.5px; font-weight:700; margin:16px 0 8px; display:flex; align-items:center; gap:8px;}
  .anual-item{display:flex; align-items:center; justify-content:space-between; gap:8px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 12px; margin-bottom:6px;}
  .anual-item span.txt{font-size:13.5px; flex:1;}
  .status-pill{border:none; border-radius:999px; padding:6px 10px; font-size:11.5px; font-weight:700; cursor:pointer; white-space:nowrap;}
  .status-listo{background:var(--good); color:#fff;}
  .status-progreso{background:var(--sky); color:#20465c;}

  /* Manipuladores */
  .manip-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .manip-card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px; display:flex; flex-direction:column; gap:8px; align-items:center; text-align:center;}
  .manip-avatar{width:52px;height:52px;border-radius:50%; background:var(--lavender-light); display:flex; align-items:center; justify-content:center; font-size:20px;}
  .manip-card input[type=text]{text-align:center; font-weight:600;}
  .file-btn{display:inline-block; font-size:12px; padding:6px 10px; border-radius:8px; background:var(--lavender-light); color:#4A3B5C; cursor:pointer; font-weight:600;}
  .file-btn input{display:none;}
  .pdf-link{font-size:12px; color:var(--clay); font-weight:600; text-decoration:none;}

  /* Proveedores */
  .prov-card .prov-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .prov-name{font-weight:700; font-size:15px;}
  .vehiculo-select{border:none; border-radius:999px; padding:5px 10px; font-size:11.5px; font-weight:700; cursor:pointer; width:auto;}
  .veh-malo{background:var(--bad); color:#fff;}
  .veh-bueno{background:var(--warn); color:#fff;}
  .veh-muybueno{background:var(--good); color:#fff;}
  .productos-list{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
  .producto-chip{background:var(--clay-light); color:#6b4423; font-size:12px; font-weight:600; padding:5px 9px; border-radius:999px; display:flex; align-items:center; gap:5px;}
  .producto-chip button{background:none; border:none; color:#6b4423; cursor:pointer; font-size:12px; padding:0;}
  .add-producto{display:flex; gap:6px; margin-top:8px;}

  /* Horario */
  .admin-emp-card{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .admin-emp-card .name-input{font-weight:700; border:none; background:transparent; padding:2px 0; font-size:15px;}
  .admin-emp-card .hrs{font-size:12.5px; color:var(--muted);}
  .badge-flag{font-size:11px; font-weight:700; padding:4px 8px; border-radius:999px; white-space:nowrap;}
  .flag-ok{background:var(--sage-light); color:#3d5c37;}
  .flag-low{background:#FBEBDE; color:#8a5a2c;}
  .flag-high{background:#F7E7E9; color:#8A4650;}
  .emp-actions{display:flex; align-items:center; gap:8px; cursor:pointer; flex:1;}
  .emp-toolbar{margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;}
  .share-box{margin-top:10px; background:var(--sky-light); border-radius:12px; padding:10px;}
  .share-box input{background:#fff;}
  .share-box .hint{font-size:11.5px; color:#2c5570; margin-top:6px;}

  .total-card{background:linear-gradient(135deg,var(--peach),var(--butter)); border-radius:18px; padding:20px; text-align:center; color:#4a3520; margin:12px 0;}
  .total-card .lbl{font-size:12.5px; opacity:.85; font-weight:600;}
  .total-card .num{font-family:'Fraunces',serif; font-size:38px; font-weight:700; margin:2px 0;}
  .total-card .unit{font-size:12.5px; opacity:.85;}
  .total-card .pdf-btn{margin-top:12px; background:#fff; color:#4a3520; border:none; padding:8px 16px; border-radius:999px; font-weight:700; font-size:13px; cursor:pointer;}

  footer.note{text-align:center; color:var(--muted); font-size:11.5px; padding:20px 24px 10px;}
  .lock-banner{background:var(--sage-light); border-radius:14px; padding:12px 14px; margin-bottom:14px; font-size:13px; color:#3d5c37; display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .lock-banner a{color:#3d5c37; font-weight:700; text-decoration:underline; white-space:nowrap;}

  @media(min-width:720px){
    .app-shell{padding:0 12px;}
    nav.tabs{flex-wrap:wrap; overflow-x:visible;}
    .manip-grid{grid-template-columns:repeat(4,1fr);}
    .row-grid.two-col-desktop{grid-template-columns:1fr 1fr;}
    table.cal{font-size:13.5px;}
    table.cal th{font-size:11.5px;}
    .card{padding:18px;}
  }
</style>
</head>
<body>
<div class="app-shell">
  <header class="top">
    <div class="eyebrow">Restaurante Begoña</div>
    <h1 id="mainTitle">Control interno</h1>
    <div class="sub" id="mainSub">Todo lo del día a día, en un solo sitio</div>
    <div id="cloudBadge" style="font-size:12px; margin-top:6px; font-weight:600;"></div>
  </header>

  <div class="app-switch" id="appSwitch">
    <button id="btn-appcc" class="active appcc" onclick="setApp('appcc')"><span class="ic">🧾</span>Control APPCC</button>
    <button id="btn-horario" class="horario" onclick="setApp('horario')"><span class="ic">🕒</span>Control Horario</button>
  </div>

  <nav class="tabs" id="tabs"></nav>
  <div id="appccExportBar" style="padding:0 16px 10px;"></div>
  <main id="main"></main>

  <footer class="note">Los datos se guardan en este dispositivo por ahora. Cuando conectemos la cuenta, se sincronizarán en la nube para todo el equipo.</footer>
</div>

<script>
/* ================= Shared helpers ================= */
const DB = {
  get(key, fallback){ try{ const r = localStorage.getItem('begona_'+key); return r?JSON.parse(r):fallback; }catch(e){return fallback;} },
  set(key,value){ localStorage.setItem('begona_'+key, JSON.stringify(value)); }
};
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function pad2(n){ return String(n).padStart(2,'0'); }
function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
function monthKey(y,m){ return y+'-'+pad2(m+1); }
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function timeOptions(){
  const arr = [''];
  for(let h=0; h<24; h++){ for(let m=0; m<60; m+=15){ arr.push(pad2(h)+':'+pad2(m)); } }
  return arr;
}
const TIME_OPTIONS = timeOptions();
function timeSelect(value, onchange){
  return `<select onchange="${onchange}">${TIME_OPTIONS.map(t=>`<option value="${t}" ${t===(value||'')?'selected':''}>${t===''?'-':t}</option>`).join('')}</select>`;
}

/* ================= Supabase (guardado en la nube) ================= */
const SUPABASE_URL = 'https://ozksefsaivqwrzcbmmto.supabase.co';
const SUPABASE_KEY = 'sb_publishable_inkklEU7tvm-bXOOsuPPMQ_y93a90JK';
const SB_TABLE = 'begona_kv';
let cloudStatus = 'conectando'; // conectando | ok | error

function sbHeaders(extra){
  return Object.assign({ apikey: SUPABASE_KEY, Authorization: 'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json' }, extra||{});
}
async function sbSet(key, value){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${SB_TABLE}?on_conflict=key`, {
      method:'POST',
      headers: sbHeaders({ Prefer:'resolution=merge-duplicates' }),
      body: JSON.stringify([{ key:key, value:value }])
    });
    cloudStatus = res.ok ? 'ok' : 'error';
  }catch(e){ cloudStatus = 'error'; }
  renderCloudBadge();
}
async function sbGetAll(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${SB_TABLE}?select=key,value`, { headers: sbHeaders() });
  if(!res.ok) throw new Error('No se pudo leer de Supabase');
  return res.json();
}
function renderCloudBadge(){
  const el = document.getElementById('cloudBadge');
  if(!el) return;
  const map = { conectando:['⏳','Conectando...','var(--muted)'], ok:['☁️','Guardado en la nube','#3d5c37'], error:['⚠️','Sin conexión, guardado solo en este dispositivo','#8A4650'] };
  const [ic,txt,color] = map[cloudStatus];
  el.innerHTML = `<span style="color:${color}">${ic} ${txt}</span>`;
}

function getLocalValue(key){
  const map = {
    appcc_temps: appcc.temps, appcc_diario: appcc.diario, appcc_camaras: appcc.camaras,
    appcc_limpieza: appcc.limpieza, appcc_anual: appcc.anual, appcc_manip: appcc.manip, appcc_prov: appcc.prov,
    horario_empleados: empleados, horario_turnos: turnos,
  };
  return map[key];
}
function applyCloudValue(key, value){
  if(key==='appcc_temps') appcc.temps = value;
  else if(key==='appcc_diario') appcc.diario = value;
  else if(key==='appcc_camaras') appcc.camaras = value;
  else if(key==='appcc_limpieza') appcc.limpieza = value;
  else if(key==='appcc_anual') appcc.anual = value;
  else if(key==='appcc_manip') appcc.manip = value;
  else if(key==='appcc_prov') appcc.prov = value;
  else if(key==='horario_empleados') empleados = value;
  else if(key==='horario_turnos') turnos = value;
  DB.set(key, value);
}
async function initCloudSync(){
  const allKeys = ['appcc_temps','appcc_diario','appcc_camaras','appcc_limpieza','appcc_anual','appcc_manip','appcc_prov','horario_empleados','horario_turnos'];
  try{
    const rows = await sbGetAll();
    const cloudMap = {};
    rows.forEach(r => cloudMap[r.key] = r.value);
    allKeys.forEach(k => {
      if(cloudMap[k] !== undefined && cloudMap[k] !== null){ applyCloudValue(k, cloudMap[k]); }
      else { sbSet(k, getLocalValue(k)); }
    });
    cloudStatus = 'ok';
  }catch(e){
    cloudStatus = 'error';
  }
  renderCloudBadge();
  renderAll();
}

let currentApp = 'appcc';
function setApp(app){
  currentApp = app;
  document.getElementById('btn-appcc').classList.toggle('active', app==='appcc');
  document.getElementById('btn-horario').classList.toggle('active', app==='horario');
  document.getElementById('mainTitle').textContent = app==='appcc' ? 'Control APPCC' : 'Control Horario';
  document.getElementById('mainSub').textContent = app==='appcc' ? 'Registro diario de higiene y seguridad alimentaria' : 'Registro mensual de turnos del equipo';
  renderAll();
}

/* ================= APPCC state ================= */
const APPCC_TABS = [
  {id:'temps',    label:'Temperaturas', icon:'🌡️', color:'peach'},
  {id:'diario',   label:'Diario',       icon:'🍳', color:'butter'},
  {id:'camaras',  label:'Cámaras',      icon:'❄️', color:'sky'},
  {id:'limpieza', label:'Limpieza',     icon:'🧽', color:'sage'},
  {id:'anual',    label:'Control anual',icon:'📋', color:'rose'},
  {id:'manip',    label:'Manipuladores',icon:'🪪', color:'lavender'},
  {id:'prov',     label:'Proveedores',  icon:'🚚', color:'clay'},
];
let activeAppccTab = 'temps';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function defaultLimpiezaItems(list){
  return list.map(([name,freq]) => ({id:uid(), name, freq, months:Array(12).fill(false), fixed:true}));
}

let appcc = {
  temps: DB.get('appcc_temps', {}),
  diario: DB.get('appcc_diario', {}),
  camaras: DB.get('appcc_camaras', {}),
  limpieza: DB.get('appcc_limpieza', {
    elementos: defaultLimpiezaItems([
      ['Superficies','Diaria'],['Tablas de corte','Diaria'],['Cuchillos y útiles','Diaria'],
      ['Vajilla','Diaria'],['Menaje','Diaria'],['Campana','Quincenal'],
      ['Chapa o plancha','Diaria'],['Fuegos y zona contigua','Diaria'],['Horno','Cada 2 días']
    ]),
    maquinaria: defaultLimpiezaItems([
      ['Picadora','Cuando se usa'],['Cortadora','Diaria'],['Envasadora','Diaria']
    ]),
    instalaciones: defaultLimpiezaItems([
      ['Suelo de cocina',''],['Paredes de cocina',''],['Techo de la cocina',''],
      ['Lavamanos / Fregadero',''],['Armarios de cocina',''],['Cámaras',''],
      ['Congeladores',''],['Despensa',''],['Techo del local','']
    ]),
  }),
  anual: DB.get('appcc_anual', {
    bloques: [
      {name:'Plan de limpieza y desinfección', items:[
        {text:'Los productos de limpieza son aptos para uso alimentario y acordes a las necesidades de limpieza', status:'listo'},
        {text:'Los productos y útiles de limpieza se encuentran correctamente almacenados.', status:'listo'},
        {text:'Los productos de limpieza se encuentran en sus envases originales o, si se han trasvasado, están correctamente identificados.', status:'listo'},
        {text:'Se utiliza el lavavajillas con un programa de agua caliente para la vajilla y otros útiles que puedan lavarse en él.', status:'listo'},
        {text:'El método y frecuencia de limpieza es adecuado para mantener las instalaciones, maquinaria y útiles en condiciones higiénicas.', status:'listo'},
      ]},
      {name:'Plan de mantenimiento', items:[
        {text:'Los equipos e instalaciones se mantienen de forma adecuada.', status:'listo'},
        {text:'La maquinaria tiene un mantenimiento correcto y se usan los lubricantes y grasas de forma adecuada.', status:'listo'},
        {text:'Todos los envases y útiles de trabajo se mantienen en buen estado y sin roturas ni fragmentos sueltos.', status:'listo'},
      ]},
      {name:'Plan de formación', items:[
        {text:'El personal ha recibido formación inicial y formación continuada de manipuladores.', status:'listo'},
        {text:'El personal al que se ha detectado la realización de prácticas incorrectas ha recibido formación adecuada.', status:'listo'},
        {text:'El personal de mantenimiento está correctamente adiestrado para estas labores.', status:'listo'},
      ]},
      {name:'Plan de lucha contra plagas', items:[
        {text:'No existen indicios de la presencia de insectos ni demás parásitos o animales indeseables.', status:'listo'},
        {text:'Se dispone de elementos que evitan la presencia de plagas y se mantienen en buen estado.', status:'listo'},
      ]},
      {name:'Plan de autocontrol', items:[
        {text:'Se cumplimentan los registros correctamente.', status:'listo'},
        {text:'Se adoptan las medidas en caso de detectar incumplimientos.', status:'listo'},
      ]},
    ],
    incidencias: [],
  }),
  manip: DB.get('appcc_manip', [
    {id:uid(), nombre:'Martin Uribarri', pdfData:null, pdfName:null},
    {id:uid(), nombre:'Nekane Santamaria', pdfData:null, pdfName:null},
    {id:uid(), nombre:'Aitor Martinez', pdfData:null, pdfName:null},
    {id:uid(), nombre:'Ricard Espinosa', pdfData:null, pdfName:null},
    {id:uid(), nombre:'Xabier Uribarri', pdfData:null, pdfName:null},

function persistAppcc(key){ DB.set('appcc_'+key, appcc[key]); sbSet('appcc_'+key, appcc[key]); }

function sectionHead(title, color){
  return `<div class="section-head"><h2><span class="accent-bar" style="background:var(--${color})"></span>${title}</h2></div>`;
}
function calNavHtml(){
  return `
    <div class="month-nav">
      <button onclick="shiftCalMonth(-1)">‹ Anterior</button>
      <div class="label"><h2>${MESES[calMonth]} ${calYear}</h2></div>
      <button onclick="shiftCalMonth(1)">Siguiente ›</button>
    </div>
  `;
}
function shiftCalMonth(delta){
  calMonth += delta;
  if(calMonth<0){ calMonth=11; calYear--; }
  if(calMonth>11){ calMonth=0; calYear++; }
  renderAll();
}
function ensureCalMonth(section, factory){
  const key = monthKey(calYear, calMonth);
  if(!appcc[section][key]){
    const n = daysInMonth(calYear, calMonth);
    appcc[section][key] = Array.from({length:n}, (_,i)=>factory(i+1));
    persistAppcc(section);
  }
  return appcc[section][key];
}
function updCalCell(section, rowId, field, value, isNumber){
  const key = monthKey(calYear, calMonth);
  const rows = appcc[section][key];
  const r = rows.find(x=>x.id===rowId);
  if(!r) return;
  r[field] = isNumber ? (value===''?null:parseFloat(value)) : value;
  persistAppcc(section); renderAll();
}

            <td><input type="number" step="0.5" value="${r.horasM||''}" placeholder="0" onchange="updCell('${empId}','${r.id}','horasM',this.value)"></td>
            <td>${timeSelect(r.entN, `updCell('${empId}','${r.id}','entN',this.value)`)}</td>
            <td>${timeSelect(r.salN, `updCell('${empId}','${r.id}','salN',this.value)`)}</td>
            <td><input type="number" step="0.5" value="${r.horasN||''}" placeholder="0" onchange="updCell('${empId}','${r.id}','horasN',this.value)"></td>
            <td class="total">${rowTotal(r).toFixed(1)}</td>
          </tr>
        `).join('')}
        </tbody>
      </table>
    </div>
  `;
}
function updCell(empId, rowId, field, value){
  const rows = getMonthRows(empId, horYear, horMonth);
  const r = rows.find(x=>x.id===rowId);
  if(!r) return;
  r[field] = value;
  persistTurnos(); renderAll();
}
function shiftHorMonth(delta){
  horMonth += delta;
  if(horMonth<0){ horMonth=11; horYear--; }
  if(horMonth>11){ horMonth=0; horYear++; }
  renderAll();
}
function toggleHorEmp(id){ horExpanded[id] = !horExpanded[id]; shareOpenFor=null; renderAll(); }

function buildEmpLink(id){
  const url = new URL(window.location.href);
  url.search = '';
  url.searchParams.set('emp', id);
  url.searchParams.set('modo', 'empleado');
  return url.toString();
}
function toggleShare(id){ shareOpenFor = (shareOpenFor===id) ? null : id; renderAll(); }
function copyShareLink(id){
  const link = buildEmpLink(id);
  const el = document.getElementById('sharelink-'+id);
  if(el){ el.select(); el.setSelectionRange(0, 99999); }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(link).catch(()=>{});
  }
  const btn = document.getElementById('copybtn-'+id);
  if(btn){ btn.textContent = '¡Copiado!'; setTimeout(()=>{ btn.textContent='Copiar enlace'; }, 2000); }
}

function renderHorario(){
  const params = new URLSearchParams(window.location.search);
  const lockId = params.get('emp');
  const isLockMode = params.get('modo')==='empleado' && lockId;

  if(isLockMode){
    const emp = empleados.find(e=>e.id===lockId);
    if(!emp){
      return `<div class="empty-hint">Este enlace no corresponde a ningún empleado guardado en este dispositivo.</div>`;
    }
    return `
      <div class="lock-banner">
        <span>👤 Horario de <strong>${emp.nombre}</strong></span>
        <a href="${window.location.pathname}">Ver panel completo</a>
      </div>
      <div class="month-nav">
        <button onclick="shiftHorMonth(-1)">‹ Anterior</button>
        <div class="label"><h2>${MESES[horMonth]} ${horYear}</h2></div>
        <button onclick="shiftHorMonth(1)">Siguiente ›</button>
      </div>
      ${renderHorarioTable(emp.id)}
    `;
  }

  return `
    <div class="card" style="background:var(--sky-light); border:none;">
      <div style="font-size:13px; color:#2c5570;">Toca un nombre para ver y editar su calendario del mes. Los días del mes ya salen puestos.</div>
    </div>
    <div class="month-nav">
      <button onclick="shiftHorMonth(-1)">‹ Anterior</button>
      <div class="label"><h2>${MESES[horMonth]} ${horYear}</h2></div>
      <button onclick="shiftHorMonth(1)">Siguiente ›</button>
    </div>
    ${empleados.length===0 ? `<div class="empty-hint">No hay empleados todavía. Añade el primero abajo.</div>` : ''}
    ${empleados.map(e => {
      const rows = getMonthRows(e.id, horYear, horMonth);
      const total = monthTotal(rows);
      let flag='flag-ok', flagText='Normal';
      if(total===0){ flag='flag-low'; flagText='Sin horas'; }
      else if(total<60){ flag='flag-low'; flagText='Pocas horas'; }
      else if(total>190){ flag='flag-high'; flagText='Muchas horas'; }
      return `
      <div class="card">
        <div class="admin-emp-card">
          <div class="emp-actions" onclick="toggleHorEmp('${e.id}')">
            <div>
              <input type="text" class="name-input" value="${e.nombre}" onclick="event.stopPropagation()" onchange="renameEmpleado('${e.id}', this.value)">
              <div class="hrs">${total.toFixed(1)} horas este mes</div>
            </div>
          </div>
          <span class="badge-flag ${flag}">${flagText}</span>
        </div>
        ${horExpanded[e.id] ? `
          ${renderHorarioTable(e.id)}
          <div class="emp-toolbar">
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); toggleShare('${e.id}')">📤 Enviar a ${e.nombre.split(' ')[0]}</button>
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); requestDeleteEmpleado('${e.id}')">${pendingDeleteEmpId===e.id ? '⚠️ Toca para confirmar' : '🗑 Eliminar empleado'}</button>
          </div>
          ${shareOpenFor===e.id ? `
            <div class="share-box">
              <label class="field-label">Enlace personal de ${e.nombre}</label>
              <input id="sharelink-${e.id}" type="text" readonly value="${buildEmpLink(e.id)}" onclick="this.select()">
              <button id="copybtn-${e.id}" class="btn btn-add btn-sm" style="margin-top:8px;" onclick="copyShareLink('${e.id}')">Copiar enlace</button>
              <div class="hint">Envíaselo por WhatsApp o donde prefieras. Cuando la web esté publicada en internet (GitHub Pages), este enlace abrirá directamente su horario en el móvil.</div>
            </div>
          ` : ''}
        ` : ''}
      </div>
    `}).join('')}

    <div class="card">
      <label class="field-label">Añadir empleado nuevo</label>
      <div style="display:flex; gap:8px;">
        <input type="text" id="nuevoEmpInput" placeholder="Nombre y apellido">
        <button class="btn btn-add" onclick="addEmpleado()">+ Añadir</button>
      </div>
    </div>
  `;
}
function addEmpleado(){
  const inp = document.getElementById('nuevoEmpInput');
  const nombre = inp ? inp.value.trim() : '';
  if(!nombre) return;
  empleados.push({id:uid(), nombre});
  persistEmpleados(); renderAll();
}
function renameEmpleado(id, nuevoNombre){
  const e = empleados.find(x=>x.id===id);
  if(!e || !nuevoNombre.trim()) return;
  e.nombre = nuevoNombre.trim();
  persistEmpleados(); renderAll();
}
function requestDeleteEmpleado(id){
  if(pendingDeleteEmpId===id){
    empleados = empleados.filter(e=>e.id!==id);
    delete turnos[id];
    persistEmpleados(); persistTurnos();
    pendingDeleteEmpId = null;
    renderAll();
  } else {
    pendingDeleteEmpId = id;
    renderAll();
    setTimeout(()=>{ if(pendingDeleteEmpId===id){ pendingDeleteEmpId=null; renderAll(); } }, 4000);
  }
}
function exportPDFFor(empId){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const emp = empleados.find(e=>e.id===empId);
  const rows = getMonthRows(empId, horYear, horMonth);
  const total = monthTotal(rows);

  doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text('Restaurante Begoña — Control Horario', 14, 18);
  doc.setFontSize(12);
  doc.text(`${emp ? emp.nombre : ''}`, 14, 26);
  doc.text(`${MESES[horMonth]} ${horYear}`, 14, 33);
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.text(`Total del mes: ${total.toFixed(1)} horas`, 14, 41);

  let y = 52;
  doc.setFontSize(9); doc.setFont('helvetica','bold');
  const headers = ['Día','Ent.M','Sal.M','Hs.M','Ent.N','Sal.N','Hs.N','Total'];
  const colX = [14,32,50,68,84,102,120,138];
  headers.forEach((h,i)=>doc.text(h, colX[i], y));
  y+=6;
  doc.setFont('helvetica','normal');
  rows.forEach(r=>{
    if(y>280){ doc.addPage(); y=20; }
    const vals = [r.dia, r.entM||'-', r.salM||'-', r.horasM||'0', r.entN||'-', r.salN||'-', r.horasN||'0', rowTotal(r).toFixed(1)];
    vals.forEach((v,i)=>doc.text(String(v), colX[i], y));
    y+=6;
  });
  doc.save(`horario_${emp?emp.nombre.replace(/\s+/g,'_'):'empleado'}_${MESES[horMonth]}_${horYear}.pdf`);
}

/* ---- Informe completo APPCC en PDF (por departamentos, para inspección de Sanidad) ---- */
function exportAppccPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const pageH = 290;
  let y = 20;

  function checkPage(needed){
    if(y + needed > pageH){ doc.addPage(); y = 20; }
  }
  function coverTitle(){
    doc.setFont('helvetica','bold'); doc.setFontSize(18);
    doc.text('Restaurante Begoña', 14, y); y+=8;
    doc.setFontSize(13); doc.setFont('helvetica','normal');
    doc.text('Informe de Control APPCC', 14, y); y+=6;
    doc.setFontSize(10); doc.setTextColor(120);
    doc.text('Generado el ' + new Date().toLocaleDateString('es-ES'), 14, y);
    doc.setTextColor(0); y+=12;
  }
  function deptHeader(title){
    checkPage(16);
    doc.setFillColor(235,225,205);
    doc.rect(14, y-5, 182, 9, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(12);
    doc.text(title, 16, y+1);
    y += 12;
    doc.setFont('helvetica','normal'); doc.setFontSize(9.5);
  }
  function line(text){
    checkPage(6);
    doc.text(text, 14, y);
    y += 5.5;
  }
  function smallNote(text){
    checkPage(6);
    doc.setTextColor(120); doc.setFontSize(8.5);
    doc.text(text, 14, y);
    doc.setTextColor(0); doc.setFontSize(9.5);
    y += 5.5;
  }

  coverTitle();

  // Temperaturas
  deptHeader(`1. Temperatura de productos recibidos — ${MESES[calMonth]} ${calYear}`);
  const tRows = appcc.temps[monthKey(calYear,calMonth)] || [];
  const tFilled = tRows.filter(r => r.producto || r.temp!=null);
  if(tFilled.length===0){ smallNote('Sin registros este mes.'); }
  tFilled.forEach(r => line(`Día ${r.dia}: ${r.producto||'-'}  |  ${r.temp!=null?r.temp+' °C':'-'}`));
  y += 4;

  // Diario
  deptHeader(`2. Control diario de cocción — ${MESES[calMonth]} ${calYear}`);
  const dRows = appcc.diario[monthKey(calYear,calMonth)] || [];
  const dFilled = dRows.filter(r => r.fritura||r.horneado||r.vapor||r.plancha||r.cambioAceite);
  if(dFilled.length===0){ smallNote('Sin registros este mes.'); }
  dFilled.forEach(r => {
    line(`Día ${r.dia}: Fritura ${r.fritura||'-'} | Horneado ${r.horneado||'-'} | Vapor ${r.vapor||'-'} | Plancha ${r.plancha||'-'}${r.cambioAceite?' | Cambio de aceite ✔':''}`);
  });
  y += 4;

  // Camaras
  deptHeader(`3. Temperatura de cámaras — ${MESES[calMonth]} ${calYear}`);
  const cRows = appcc.camaras[monthKey(calYear,calMonth)] || [];
  const cFilled = cRows.filter(r => [r.c1,r.c2,r.c3,r.c4,r.c5].some(v=>v!=null));
  if(cFilled.length===0){ smallNote('Sin registros este mes.'); }
  cFilled.forEach(r => line(`Día ${r.dia}: C1 ${r.c1??'-'} | C2 ${r.c2??'-'} | C3 ${r.c3??'-'} | C4 ${r.c4??'-'} | C5 ${r.c5??'-'}`));
  y += 4;

  // Limpieza
  deptHeader('4. Control de limpieza');
  [['elementos','Elementos / Utillaje'],['maquinaria','Maquinaria'],['instalaciones','Instalaciones']].forEach(([key,label])=>{
    checkPage(8);
    doc.setFont('helvetica','bold'); doc.text(label, 14, y); y+=5.5;
    doc.setFont('helvetica','normal');
    appcc.limpieza[key].forEach(it => {
      const doneMonths = MESES.filter((m,i)=>it.months[i]).map(m=>m.slice(0,3));
      line(`${it.name}${it.freq?' ('+it.freq+')':''}: ${doneMonths.length ? doneMonths.join(', ') : 'sin marcar'}`);
    });
    y += 3;
  });

  // Anual
  deptHeader('5. Control anual');
  appcc.anual.bloques.forEach(b => {
    checkPage(8);
    doc.setFont('helvetica','bold'); doc.text(b.name, 14, y); y+=5.5;
    doc.setFont('helvetica','normal');
    b.items.forEach(it => line(`- [${it.status==='listo'?'Listo':'En progreso'}] ${it.text}`));
    y += 3;
  });
  checkPage(8);
  doc.setFont('helvetica','bold'); doc.text('Incidencias', 14, y); y+=5.5;
  doc.setFont('helvetica','normal');
  if(appcc.anual.incidencias.length===0){ smallNote('Sin incidencias registradas.'); }
  appcc.anual.incidencias.forEach(inc => line(`${inc.fecha}: ${inc.texto}`));
  y += 4;

  // Manipuladores
  deptHeader('6. Manipuladores de alimentos');
  appcc.manip.forEach(p => line(`${p.nombre}: ${p.pdfData ? 'Carnet subido ('+ (p.pdfName||'PDF') +')' : 'Sin carnet subido'}`));
  y += 4;

  // Proveedores
  deptHeader('7. Proveedores');
  appcc.prov.forEach(p => {
    const vehTxt = p.vehiculo==='muybueno'?'Muy bueno':p.vehiculo==='bueno'?'Bueno':'Malo';
    checkPage(12);
    doc.setFont('helvetica','bold'); doc.text(p.nombre, 14, y); y+=5;
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    line(`${p.direccion||'-'} | Contacto: ${p.contacto||'-'} | Tel: ${p.telefono||'-'} | Vehículo: ${vehTxt}`);
    if(p.productos.length) line(`Productos: ${p.productos.join(', ')}`);
    doc.setFontSize(9.5);
    y += 2;
  });

  doc.save(`APPCC_Restaurante_Begona_${MESES[calMonth]}_${calYear}.pdf`);
}
function renderExportBar(){
  const bar = document.getElementById('appccExportBar');
  if(currentApp!=='appcc'){ bar.innerHTML=''; return; }
  bar.innerHTML = `<button class="btn btn-add" onclick="exportAppccPDF()">📄 Exportar informe completo (PDF)</button>`;
}

/* ================= Render dispatcher ================= */
function renderTabs(){
  const nav = document.getElementById('tabs');
  if(currentApp!=='appcc'){ nav.innerHTML=''; return; }
  nav.innerHTML = APPCC_TABS.map(t => `
    <button data-tab="${t.id}" class="${activeAppccTab===t.id?'active':''}" style="${activeAppccTab===t.id?`background:var(--${t.color});`:''}">
      <span>${t.icon}</span><span>${t.label}</span>
    </button>
  `).join('');
  nav.querySelectorAll('button').forEach(b=>{ b.onclick = () => { activeAppccTab = b.dataset.tab; renderAll(); }; });
}
function renderAll(){
  renderTabs();
  renderExportBar();
  const main = document.getElementById('main');
  if(currentApp==='appcc'){
    const renderers = { temps:renderTemps, diario:renderDiario, camaras:renderCamaras, limpieza:renderLimpieza, anual:renderAnual, manip:renderManip, prov:renderProv };
    main.innerHTML = renderers[activeAppccTab]();
  } else {
    main.innerHTML = renderHorario();
  }
}

/* ---- Modo empleado por enlace: entra directo en Horario, sin pestañas de APPCC ---- */
(function initLockMode(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('modo')==='empleado' && params.get('emp')){
    currentApp = 'horario';
    document.getElementById('appSwitch').style.display = 'none';
    document.getElementById('mainTitle').textContent = 'Control Horario';
    document.getElementById('mainSub').textContent = 'Tu registro de turnos';
  }
})();

renderAll();
renderCloudBadge();
initCloudSync();
</script>
